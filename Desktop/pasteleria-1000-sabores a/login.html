<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand-title">Pastelería 1000 Sabores</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px;">
        <h2>Ingreso de Usuario</h2>
        <p style="color: var(--texto-secundario); margin-bottom: 20px;">50 Años endulzando tus momentos</p>

        <form id="form-login" novalidate>
            <div style="margin-bottom: 15px;">
                <label for="login-correo">Correo Electrónico:</label>
                <input type="email" id="login-correo" style="width: 100%; padding: 8px; margin-top: 5px;">
                <div id="error-login-correo" class="error-message"></div>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="login-pass">Contraseña:</label>
                <input type="password" id="login-pass" style="width: 100%; padding: 8px; margin-top: 5px;">
                <div id="error-login-pass" class="error-message"></div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">Ingresar</button>
        </form>
    </main>

    <script src="js/validaciones.js"></script>
    <script>
        document.getElementById('form-login').addEventListener('submit', validarLogin);
    </script>
</body>
</html>
