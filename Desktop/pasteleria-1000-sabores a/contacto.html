<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand-title">Pastelería 1000 Sabores</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="box-form">
            <h2>Formulario de Contacto</h2>
            <form id="form-contacto" novalidate>
                <div class="form-group">
                    <label for="cont-nombre">Nombre Completo:</label>
                    <input type="text" id="cont-nombre">
                    <div id="error-cont-nombre" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="cont-correo">Correo Electrónico:</label>
                    <input type="email" id="cont-correo">
                    <div id="error-cont-correo" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="cont-comentario">Comentario:</label>
                    <textarea id="cont-comentario" rows="5"></textarea>
                    <div id="error-cont-comentario" class="error-message"></div>
                </div>
                <button type="submit" class="btn-primary">Enviar Mensaje</button>
            </form>
        </div>
    </main>
    <script src="js/validaciones.js"></script>
</body>
</html>
