<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand-title">Pastelería 1000 Sabores</a>
    </nav>

    <main class="container">
        <div class="box-form" style="max-width: 400px;">
            <h2>Iniciar Sesión</h2>
            <form id="form-login" novalidate>
                <div class="form-group">
                    <label for="login-correo">Correo:</label>
                    <input type="email" id="login-correo">
                    <div id="error-login-correo" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="login-pass">Contraseña:</label>
                    <input type="password" id="login-pass">
                    <div id="error-login-pass" class="error-message"></div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Ingresar</button>
            </form>
        </div>
    </main>
    <script src="js/validaciones.js"></script>
</body>
</html>
