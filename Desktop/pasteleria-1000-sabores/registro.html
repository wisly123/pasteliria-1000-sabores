<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand-title">Pastelería 1000 Sabores 🎂</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="registro.html" class="active">Registro</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="box-form">
            <h2>Crear Cuenta de Usuario</h2>
            <form id="form-registro" novalidate>
                <div class="form-group">
                    <label for="reg-run">RUN (Sin puntos ni guion. Ej: 19011022K):</label>
                    <input type="text" id="reg-run">
                    <div id="error-reg-run" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="reg-nombre">Nombre:</label>
                    <input type="text" id="reg-nombre">
                    <div id="error-reg-nombre" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="reg-apellido">Apellidos:</label>
                    <input type="text" id="reg-apellido">
                    <div id="error-reg-apellido" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="reg-correo">Correo Electrónico:</label>
                    <input type="email" id="reg-correo">
                    <div id="error-reg-correo" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="region">Región:</label>
                    <select id="region"><option value="">Seleccione Región</option></select>
                </div>
                <div class="form-group">
                    <label for="comuna">Comuna:</label>
                    <select id="comuna"><option value="">Seleccione Comuna</option></select>
                </div>
                <div class="form-group">
                    <label for="reg-direccion">Dirección:</label>
                    <input type="text" id="reg-direccion">
                    <div id="error-reg-direccion" class="error-message"></div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Registrar</button>
            </form>
        </div>
    </main>

    <script src="js/regiones.js"></script>
    <script src="js/validaciones.js"></script>
</body>
</html>
